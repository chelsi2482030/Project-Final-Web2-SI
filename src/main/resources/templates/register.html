<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Product CRUD</title>
    <th:block th:replace="~{fragments/layout :: header}"></th:block>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow-md border border-gray-100 w-full max-w-md">

    <h3 class="text-2xl font-bold mb-6 text-center text-gray-800">Register</h3>

    <div th:if="${error}" class="bg-red-50 text-red-700 p-4 mb-6 rounded-md border border-red-200 text-sm" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="space-y-4">

        <div>
            <label for="fullName" class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
            <input type="text" id="fullName" th:field="*{fullName}" placeholder="Masukkan nama lengkap"
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
        </div>

        <div>
            <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
            <input type="email" id="email" th:field="*{email}" placeholder="Masukkan email (opsional)"
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
        </div>

        <div>
            <label for="username" class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
            <input type="text" id="username" th:field="*{username}" placeholder="Masukkan username"
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none" required autofocus>
        </div>

        <div>
            <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
            <input type="password" id="password" th:field="*{password}" placeholder="Masukkan password"
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
        </div>

        <div>
            <label for="confirmPassword" class="block text-sm font-semibold text-gray-700 mb-1">Konfirmasi Password</label>
            <input type="password" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Ulangi password"
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none" required>
        </div>

        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-md transition duration-200 mt-2">
            Daftar
        </button>
    </form>

    <div class="text-center mt-6 text-sm text-gray-600">
        <span>Sudah punya akun? </span>
        <a th:href="@{/login}" class="text-blue-600 hover:underline font-semibold">Login di sini</a>
    </div>
</div>

</body>
</html>
