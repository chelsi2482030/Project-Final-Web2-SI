<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="bg-white p-6 rounded shadow w-full max-w-md">
    <h2 class="text-xl font-bold mb-4 text-center">Sandi Baru</h2>

    <div th:if="${error}" class="bg-red-100 text-red-700 p-2 rounded mb-4 text-sm" th:text="${error}"></div>

    <form th:action="@{/reset-password}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <input type="hidden" name="email" th:value="${email}">

        <input type="password" name="newPassword" placeholder="Sandi Baru"
               class="w-full mb-3 px-3 py-2 border rounded" required>

        <input type="password" name="confirmPassword" placeholder="Konfirmasi Sandi"
               class="w-full mb-4 px-3 py-2 border rounded" required>

        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded">Simpan Sandi</button>
    </form>

    <div class="mt-4 text-center">
        <a th:href="@{/login}" class="text-sm text-blue-500 hover:underline">Batal dan Kembali ke Login</a>
    </div>
</div>
</body>
</html>
