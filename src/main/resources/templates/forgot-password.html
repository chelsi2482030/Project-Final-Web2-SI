<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lupa Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<div class="bg-white p-6 rounded shadow w-full max-w-md">
    <h2 class="text-xl font-bold mb-4 text-center">Pemulihan Akun</h2>

    <div th:if="${success}" class="bg-green-100 text-green-700 p-3 mb-3 rounded text-sm text-center">
        Email ditemukan! <br>
        <a th:href="@{/reset-password(email=${email})}" class="font-bold underline text-blue-600">KLIK DI SINI UNTUK RESET</a>
    </div>

    <div th:if="${error}" class="bg-red-100 text-red-700 p-3 mb-3 rounded text-sm text-center" th:text="${error}"></div>

    <form th:action="@{/forgot-password}" method="post" th:if="${success == null}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <input type="email" name="email" placeholder="Masukkan Email" class="w-full mb-4 px-3 py-2 border rounded" required>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded">Cek Email</button>
    </form>

    <div class="text-center mt-4">
        <a th:href="@{/login}" class="text-sm text-blue-600 hover:underline">Kembali ke Login</a>
    </div>
</div>
</body>
</html>
