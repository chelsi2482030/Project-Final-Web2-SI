<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="header">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product CRUD</title>
    <link th:href="@{/css/style-output.css}" rel="stylesheet">
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>

<nav th:fragment="navbar" x-data="{ open: false }" class="bg-gray-800 text-white mb-6 p-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">

        <a class="text-xl font-bold" th:href="@{/}">Product CRUD</a>

        <button @click="open = !open" class="lg:hidden p-2 text-gray-300 hover:text-white">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>

        <div :class="open ? 'block' : 'hidden'" class="lg:flex lg:items-center w-full lg:w-auto mt-4 lg:mt-0">
            <ul class="flex flex-col lg:flex-row space-y-2 lg:space-y-0 lg:space-x-6">
                <li><a class="hover:text-gray-300" th:href="@{/}">Home</a></li>
                <li><a class="hover:text-gray-300" th:href="@{/products}">Products</a></li>
            </ul>

            <div class="flex items-center mt-4 lg:mt-0 lg:ml-6">

                <div sec:authorize="isAuthenticated()" x-data="{ drop: false }" class="relative">
                    <button @click="drop = !drop" class="flex items-center space-x-2 text-white hover:text-gray-300">
                        <span>Halo, <strong th:text="${#authentication.name}">User</strong></span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>

                    <div x-show="drop" @click.away="drop = false" class="absolute right-0 mt-2 w-48 bg-white text-gray-800 rounded-lg shadow-lg py-2 z-50">
                        <a class="block px-4 py-2 hover:bg-gray-100" th:href="@{/profile}">View Profile</a>
                        <a class="block px-4 py-2 hover:bg-gray-100" th:href="@{/edit-profile}">Edit Profile</a>
                        <hr class="border-gray-200 my-1">
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="w-full text-left px-4 py-2 hover:bg-gray-100 text-red-600">Logout</button>
                        </form>
                    </div>
                </div>

                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-medium">Login</a>
                </div>
            </div>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="py-6 mt-10">
    <div class="max-w-7xl mx-auto px-4 text-center text-gray-500">
        <hr class="mb-4">
        <p>Product CRUD - 2026</p>
    </div>
</footer>

</html>
