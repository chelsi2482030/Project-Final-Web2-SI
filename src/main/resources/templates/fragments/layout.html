<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ================= HEADER ================= -->
<head th:fragment="header">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product CRUD</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<!-- ================= NAVBAR ================= -->
<nav th:fragment="navbar"
     class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">

    <div class="container">

        <!-- LOGO -->
        <a class="navbar-brand" th:href="@{/}">
            Product CRUD
        </a>

        <!-- TOGGLER -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- MENU -->
        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- MENU PINDAH KE KANAN -->
            <ul class="navbar-nav ms-auto">

                <!-- DASHBOARD -->
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        Home
                    </a>
                </li>

                <!-- PRODUCTS -->
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">
                        Products
                    </a>
                </li>

            </ul>

            <!-- RIGHT MENU -->
            <div class="d-flex align-items-center ms-3">

                <!-- JIKA LOGIN -->
                <div sec:authorize="isAuthenticated()" class="dropdown">

                    <!-- USER NAME -->
                    <a class="nav-link dropdown-toggle text-light"
                       href="#"
                       role="button"
                       data-bs-toggle="dropdown">

                        Halo, <strong th:text="${#authentication.name}">User</strong>
                    </a>

                    <!-- DROPDOWN MENU -->
                    <ul class="dropdown-menu dropdown-menu-end">

                        <li>
                            <a class="dropdown-item" th:href="@{/profile}">
                                View Profile
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item" th:href="@{/edit-profile}">
                                Edit Profile
                            </a>
                        </li>

                        <li><hr class="dropdown-divider"></li>

                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item">
                                    Logout
                                </button>
                            </form>
                        </li>

                    </ul>
                </div>

                <!-- JIKA BELUM LOGIN -->
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn-outline-light btn-sm">
                        Login
                    </a>
                </div>

            </div>

        </div>
    </div>
</nav>

<!-- ================= FOOTER ================= -->
<footer th:fragment="footer">

    <div class="container">
        <hr>
        <p class="text-center text-muted py-3 mb-0">
            Product CRUD - 2026
        </p>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</footer>

</html>
