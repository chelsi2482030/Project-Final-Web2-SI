<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <th:block th:replace="~{fragments/layout :: header}"></th:block>
</head>
<body class="bg-gray-50">

<th:block th:replace="~{fragments/layout :: navbar}"></th:block>

<div class="max-w-2xl mx-auto p-4 mt-8">
    <div class="bg-white p-8 rounded-lg shadow-md border border-gray-100">

        <h2 class="text-2xl font-bold mb-6 text-gray-800">Edit Profile</h2>

        <div th:if="${successMessage}" class="bg-green-100 text-green-700 p-4 rounded-md mb-6 border border-green-200">
            <p th:text="${successMessage}"></p>
        </div>

        <form th:action="@{/edit-profile}" method="post" class="space-y-4">

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Username</label>
                <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md bg-gray-100 text-gray-500 cursor-not-allowed" th:value="${user.username}" readonly>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Profile Image URL</label>
                <input type="text" name="profileImageUrl" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                       th:value="${user.profileImageUrl}" placeholder="Masukkan link foto (opsional)">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Full Name</label>
                <input type="text" name="fullName" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" th:value="${user.fullName}" required>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Email</label>
                <input type="email" name="email" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" th:value="${user.email}">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Phone Number</label>
                <input type="text" name="phoneNumber" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" th:value="${user.phoneNumber}">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Address</label>
                <input type="text" name="address" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" th:value="${user.address}">
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Bio</label>
                <textarea name="bio" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" th:text="${user.bio}"></textarea>
            </div>

            <div class="mt-6 flex gap-3">
                <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-md transition">Save Changes</button>
                <a th:href="@{/profile}" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded-md transition">Cancel</a>
            </div>
        </form>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: footer}"></th:block>

</body>
</html>
