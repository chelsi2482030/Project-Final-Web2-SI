<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Tambahkan Bootstrap jika belum ada di style.css agar tampilan rapi -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <div class="card p-4">

        <h2>Edit Profile</h2>

        <!-- SUCCESS MESSAGE -->
        <div th:if="${successMessage}" class="alert alert-success">
            <p th:text="${successMessage}"></p>
        </div>

        <!-- FORM -->
        <form th:action="@{/edit-profile}" method="post">

            <!-- USERNAME (READ ONLY) -->
            <div class="mb-3">
                <label>Username</label>
                <input type="text" class="form-control"
                       th:value="${user.username}" readonly>
            </div>

            <!-- FULL NAME -->
            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" class="form-control"
                       name="fullName"
                       th:value="${user.fullName}">
            </div>

            <!-- PHONE (DIUBAH DARI phone MENJADI phoneNumber) -->
            <div class="mb-3">
                <label>Phone</label>
                <input type="text" class="form-control"
                       name="phoneNumber"
                       th:value="${user.phoneNumber}">
            </div>

            <!-- ADDRESS -->
            <div class="mb-3">
                <label>Address</label>
                <input type="text" class="form-control"
                       name="address"
                       th:value="${user.address}">
            </div>

            <!-- BIO -->
            <div class="mb-3">
                <label>Bio</label>
                <textarea class="form-control"
                          name="bio"
                          rows="3"
                          th:text="${user.bio}"></textarea>
            </div>

            <!-- BUTTON -->
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">
                    Save Changes
                </button>

                <a th:href="@{/profile}" class="btn btn-secondary">
                    Cancel
                </a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
