<body>

<th:block th:replace="~{fragments/layout :: navbar}"></th:block>

<div class="container mt-4">
    <div class="card shadow p-4">
        <h2 class="mb-4">Edit Profile</h2>

        <form th:action="@{/edit-profile}" method="post">
            <!-- Username (Read Only) -->
            <div class="mb-3">
                <label class="form-label fw-bold">Username</label>
                <input type="text" class="form-control bg-light" th:value="${user.username}" readonly>
            </div>

            <!-- 🔥 TAMBAHAN: PROFILE IMAGE URL -->
            <div class="mb-3">
                <label class="form-label fw-bold">Profile Image URL</label>
                <input type="text" class="form-control" name="profileImageUrl"
                       th:value="${user.profileImageUrl}" placeholder="Masukkan link foto (opsional)">
            </div>

            <!-- Full Name -->
            <div class="mb-3">
                <label class="form-label fw-bold">Full Name</label>
                <input type="text" class="form-control" name="fullName" th:value="${user.fullName}" required>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label fw-bold">Email</label>
                <input type="email" class="form-control" name="email" th:value="${user.email}">
            </div>

            <!-- Phone Number -->
            <div class="mb-3">
                <label class="form-label fw-bold">Phone Number</label>
                <input type="text" class="form-control" name="phoneNumber" th:value="${user.phoneNumber}">
            </div>

            <!-- Address -->
            <div class="mb-3">
                <label class="form-label fw-bold">Address</label>
                <input type="text" class="form-control" name="address" th:value="${user.address}">
            </div>

            <!-- Bio -->
            <div class="mb-3">
                <label class="form-label fw-bold">Bio</label>
                <textarea class="form-control" name="bio" rows="3" th:text="${user.bio}"></textarea>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-success px-4">Save Changes</button>
                <a th:href="@{/profile}" class="btn btn-secondary px-4">Cancel</a>
            </div>
        </form>
    </div>
</div>
