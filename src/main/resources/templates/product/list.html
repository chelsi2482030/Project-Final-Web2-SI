<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>

<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Daftar Produk</h2>
        <a th:href="@{/products/new}" class="btn btn-success">
            + Tambah Produk Baru
        </a>
    </div>

    <!-- FLASH MESSAGE -->
    <div th:if="${successMessage}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger">
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- SEARCH & FILTER -->
    <form method="get" th:action="@{/products}" class="row g-2 mb-3">

        <!-- Search -->
        <div class="col-md-4">
            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Cari produk..."
                   th:value="${keyword}">
        </div>

        <!-- Filter Category -->
        <div class="col-md-3">
            <select name="category" class="form-select">
                <option value="">Semua Kategori</option>

                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${cat.id == selectedCategory}">
                </option>
            </select>
        </div>

        <!-- Button -->
        <div class="col-md-3">
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="@{/products}" class="btn btn-secondary">Reset</a>
        </div>

    </form>

    <!-- TOTAL -->
    <p class="text-muted">
        Total produk: <strong th:text="${products.totalElements}">0</strong>
    </p>

    <!-- TABLE -->
    <div th:if="${products.content.size() > 0}">
        <table class="table table-striped table-hover">

            <thead class="table-dark">
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Stok</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="product, iter : ${products.content}">
                <td th:text="${iter.index + 1}"></td>

                <td th:text="${product.name}"></td>

                <td th:text="${product.category != null ? product.category.name : '-'}"></td>

                <td th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}"></td>

                <td th:text="${product.stock}"></td>

                <td>
                    <span th:if="${product.active}" class="badge bg-success">Aktif</span>
                    <span th:unless="${product.active}" class="badge bg-danger">Tidak Aktif</span>
                </td>

                <td>
                    <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-info btn-sm">
                        Detail
                    </a>

                    <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn btn-warning btn-sm">
                        Edit
                    </a>

                    <form th:action="@{/products/{id}/delete(id=${product.id})}"
                          method="post"
                          style="display:inline;"
                          onsubmit="return confirm('Yakin hapus?');">

                        <button type="submit" class="btn btn-danger btn-sm">
                            Hapus
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>

        </table>
    </div>

    <!-- EMPTY -->
    <div th:if="${products.content.size() == 0}" class="text-center py-5">
        <p class="text-muted">Belum ada produk</p>
        <a th:href="@{/products/new}" class="btn btn-primary">
            Tambah Produk Pertama
        </a>
    </div>

    <!-- PAGINATION -->
    <div class="mt-4 text-center" th:if="${products.totalPages > 1}">

        <!-- Previous -->
        <a th:if="${products.number > 0}"
           th:href="@{/products(page=${products.number - 1}, keyword=${keyword}, category=${selectedCategory})}"
           class="btn btn-outline-primary btn-sm">
            Previous
        </a>

        <!-- Number -->
        <span th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}">
            <a th:href="@{/products(page=${i}, keyword=${keyword}, category=${selectedCategory})}"
               th:text="${i + 1}"
               class="btn btn-sm"
               th:classappend="${i == products.number} ? 'btn-primary' : 'btn-outline-primary'">
            </a>
        </span>

        <!-- Next -->
        <a th:if="${products.number < products.totalPages - 1}"
           th:href="@{/products(page=${products.number + 1}, keyword=${keyword}, category=${selectedCategory})}"
           class="btn btn-outline-primary btn-sm">
            Next
        </a>

    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
