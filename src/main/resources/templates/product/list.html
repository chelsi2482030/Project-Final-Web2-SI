<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Daftar Produk</h2>
        <a th:href="@{/products/new}" class="btn btn-success">+ Tambah Produk Baru</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form method="get" th:action="@{/products}" class="row g-2 mb-3">
        <div class="col-md-4">
            <input type="text" name="keyword" class="form-control" placeholder="Cari produk..." th:value="${keyword}">
        </div>
        <div class="col-md-3">
            <select name="categories" class="form-select">
                <option value="">Semua Kategori</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${cat.id == selectedCategory}"></option>
            </select>
        </div>
        <div class="col-md-3">
            <button type="submit" class="btn btn-primary">Search</button>
            <a th:href="@{/products}" class="btn btn-secondary">Reset</a>
        </div>
    </form>

    <p class="text-muted">Total produk: <strong th:text="${products.totalElements}">0</strong></p>

    <div th:if="${products.totalElements > 0}">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Kategori</th>
                <th>Harga</th>
                <th>Stok</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product, iter : ${products.content}">
                <td th:text="${(products.number * products.size) + iter.index + 1}"></td>
                <td th:text="${product.name}"></td>
                <td th:text="${product.categories != null ? product.categories.name : '-'}"></td>
                <td th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}"></td>
                <td th:text="${product.stock}"></td>
                <td>
                    <span th:if="${product.active}" class="badge bg-success">Aktif</span>
                    <span th:unless="${product.active}" class="badge bg-danger">Tidak Aktif</span>
                </td>
                <td>
                    <a th:href="@{/products/{id}(id=${product.id})}" class="btn btn-info btn-sm">Detail</a>
                    <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-warning btn-sm">Edit</a>
                    <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" style="display:inline;" onsubmit="return confirm('Yakin hapus?');">
                        <button type="submit" class="btn btn-danger btn-sm">Hapus</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <nav aria-label="Page navigation" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/products(page=${products.number - 1}, keyword=${keyword}, categories=${selectedCategory})}">Previous</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                    th:classappend="${i == products.number} ? 'active'">
                    <a class="page-link" th:href="@{/products(page=${i}, keyword=${keyword}, categories=${selectedCategory})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/products(page=${products.number + 1}, keyword=${keyword}, categories=${selectedCategory})}">Next</a>
                </li>
            </ul>
        </nav>
    </div>

    <div th:if="${products.totalElements == 0}" class="text-center py-5">
        <p class="text-muted">Belum ada produk</p>
        <a th:href="@{/products/new}" class="btn btn-primary">Tambah Produk Pertama</a>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
