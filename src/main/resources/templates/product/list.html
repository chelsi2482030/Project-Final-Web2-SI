<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-gray-50">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-7xl mx-auto px-4 py-8">
    <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
        <h2 class="text-2xl font-bold text-gray-800">Daftar Produk</h2>
        <a th:href="@{/products/new}" class="bg-green-600 hover:bg-green-700 text-white font-semibold px-6 py-2 rounded-lg transition">
            + Tambah Produk Baru
        </a>
    </div>

    <div th:if="${successMessage}" class="bg-green-100 text-green-700 p-4 rounded-lg mb-6 border border-green-200" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="bg-red-100 text-red-700 p-4 rounded-lg mb-6 border border-red-200" th:text="${errorMessage}"></div>

    <form method="get" th:action="@{/products}" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 bg-white p-4 rounded-lg shadow-sm border border-gray-100">
        <div>
            <input type="text" name="keyword" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Cari produk..." th:value="${keyword}">
        </div>
        <div>
            <select name="categories" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 outline-none">
                <option value="">Semua Kategori</option>
                <option th:each="cat : ${categories}"
                        th:value="${cat.id}"
                        th:text="${cat.name}"
                        th:selected="${cat.id == selectedCategory}"></option>
            </select>
        </div>
        <div class="flex gap-2">
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md transition flex-1">Search</button>
            <a th:href="@{/products}" class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-md transition flex-1 text-center">Reset</a>
        </div>
    </form>

    <p class="text-gray-600 mb-4">Total produk: <strong th:text="${products.totalElements}">0</strong></p>

    <div th:if="${products.totalElements > 0}" class="overflow-x-auto shadow-md rounded-lg bg-white">
        <table class="w-full text-left text-sm text-gray-700">
            <thead class="bg-gray-800 text-white uppercase text-xs">
            <tr>
                <th class="px-6 py-3">No</th>
                <th class="px-6 py-3">Nama</th>
                <th class="px-6 py-3">Kategori</th>
                <th class="px-6 py-3">Harga</th>
                <th class="px-6 py-3">Stok</th>
                <th class="px-6 py-3">Status</th>
                <th class="px-6 py-3 text-center">Aksi</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
            <tr th:each="product, iter : ${products.content}" class="hover:bg-gray-50 transition">
                <td class="px-6 py-4" th:text="${(products.number * products.size) + iter.index + 1}"></td>
                <td class="px-6 py-4 font-medium text-gray-900" th:text="${product.name}"></td>
                <td class="px-6 py-4" th:text="${product.categories != null ? product.categories.name : '-'}"></td>
                <td class="px-6 py-4" th:text="${'Rp ' + #numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA')}"></td>
                <td class="px-6 py-4" th:text="${product.stock}"></td>
                <td class="px-6 py-4">
                    <span th:if="${product.active}" class="px-2 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-700">Aktif</span>
                    <span th:unless="${product.active}" class="px-2 py-1 text-xs font-semibold rounded-full bg-red-100 text-red-700">Tidak Aktif</span>
                </td>
                <td class="px-6 py-4 flex gap-2 justify-center">
                    <a th:href="@{/products/{id}(id=${product.id})}" class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1 rounded text-xs font-bold transition">Detail</a>
                    <a th:href="@{/products/edit/{id}(id=${product.id})}" class="bg-yellow-100 hover:bg-yellow-200 text-yellow-700 px-3 py-1 rounded text-xs font-bold transition">Edit</a>
                    <form th:action="@{/products/{id}/delete(id=${product.id})}" method="post" onsubmit="return confirm('Yakin hapus?');">
                        <button type="submit" class="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1 rounded text-xs font-bold transition">Hapus</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${products.totalElements > 0}" class="mt-8 flex justify-center">
        <ul class="flex items-center gap-1">
            <li>
                <a th:href="@{/products(page=${products.number - 1}, keyword=${keyword}, categories=${selectedCategory})}"
                   th:classappend="${products.first} ? 'pointer-events-none opacity-50' : 'hover:bg-gray-100'"
                   class="px-4 py-2 border rounded-md transition">Previous</a>
            </li>

            <li th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}">
                <a th:href="@{/products(page=${i}, keyword=${keyword}, categories=${selectedCategory})}"
                   th:text="${i + 1}"
                   th:classappend="${i == products.number} ? 'bg-blue-600 text-white' : 'hover:bg-gray-100'"
                   class="px-4 py-2 border rounded-md transition">1</a>
            </li>

            <li>
                <a th:href="@{/products(page=${products.number + 1}, keyword=${keyword}, categories=${selectedCategory})}"
                   th:classappend="${products.last} ? 'pointer-events-none opacity-50' : 'hover:bg-gray-100'"
                   class="px-4 py-2 border rounded-md transition">Next</a>
            </li>
        </ul>
    </nav>

    <div th:if="${products.totalElements == 0}" class="text-center py-16 bg-white rounded-lg shadow-sm border border-gray-100">
        <p class="text-gray-500 mb-4">Belum ada produk</p>
        <a th:href="@{/products/new}" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md transition">Tambah Produk Pertama</a>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
