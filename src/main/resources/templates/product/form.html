<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>

<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <!-- TITLE -->
            <h2 class="mb-4"
                th:text="${product.id != null} ? 'Edit Produk' : 'Tambah Produk Baru'">
            </h2>

            <!-- FORM -->
            <form th:action="@{/products/save}" th:object="${product}" method="post">

                <!-- hidden -->
                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{createdAt}">
                <input type="hidden" th:field="*{price}">

                <!-- NAMA -->
                <div class="mb-3">
                    <label class="form-label">Nama Produk</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{name}"
                           placeholder="Masukkan nama produk"
                           required>
                </div>

                <!-- CATEGORY -->
                <div class="mb-3">
                    <label class="form-label">Kategori</label>
                    <select th:field="*{category.id}" class="form-select" required>
                        <option value="">-- Pilih Kategori --</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}">
                        </option>
                    </select>
                </div>

                <!-- HARGA -->
                <div class="mb-3">
                    <label class="form-label">Harga</label>
                    <input type="text"
                           id="priceDisplay"
                           class="form-control"
                           placeholder="Masukkan harga"
                           required>
                </div>

                <!-- STOK -->
                <div class="mb-3">
                    <label class="form-label">Stok</label>
                    <input type="number"
                           class="form-control"
                           th:field="*{stock}"
                           min="0"
                           required>
                </div>

                <!-- DESKRIPSI -->
                <div class="mb-3">
                    <label class="form-label">Deskripsi</label>
                    <textarea class="form-control"
                              th:field="*{description}"
                              rows="3">
                    </textarea>
                </div>

                <!-- STATUS -->
                <div class="mb-3 form-check">
                    <input type="checkbox"
                           class="form-check-input"
                           th:field="*{active}">
                    <label class="form-check-label">Produk Aktif</label>
                </div>

                <!-- BUTTON -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        Simpan
                    </button>

                    <a th:href="@{/products}" class="btn btn-secondary">
                        Batal
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<!-- SCRIPT FORMAT HARGA -->
<script>
    const priceHidden = document.querySelector('input[name="price"]');
    const priceDisplay = document.getElementById('priceDisplay');

    function formatRupiah(value) {
        return new Intl.NumberFormat('id-ID').format(value);
    }

    if (priceHidden && priceHidden.value) {
        priceDisplay.value = formatRupiah(priceHidden.value);
    }

    priceDisplay.addEventListener('input', function () {
        let raw = this.value.replace(/\D/g, '');
        priceHidden.value = raw || 0;
        this.value = raw ? formatRupiah(raw) : '';
    });
</script>

</body>
</html>
