<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>

<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <h2 class="mb-4" th:text="${product.id != null} ? 'Edit Produk' : 'Tambah Produk Baru'"></h2>

            <form th:action="@{/products/save}" th:object="${product}" method="post">

                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{createdAt}">

                <input type="hidden" id="priceReal" th:field="*{price}">

                <div class="mb-3">
                    <label class="form-label">Nama Produk</label>
                    <input type="text" class="form-control" th:field="*{name}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Kategori</label>
                    <select th:field="*{category.id}" class="form-select" required>
                        <option value="">-- Pilih Kategori --</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}">
                        </option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Harga</label>
                    <div class="input-group">
                        <span class="input-group-text">Rp</span>
                        <input type="text"
                               id="priceDisplay"
                               class="form-control"
                               placeholder="Contoh: 10.000"
                               required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Stok</label>
                    <input type="number" class="form-control" th:field="*{stock}" min="0" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Deskripsi</label>
                    <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" th:field="*{active}" id="activeStatus">
                    <label class="form-check-label" for="activeStatus">Produk Aktif</label>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Simpan</button>
                    <a th:href="@{/products}" class="btn btn-secondary">Batal</a>
                </div>

            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
    const priceHidden = document.getElementById('priceReal');
    const priceDisplay = document.getElementById('priceDisplay');

    function formatRupiah(value) {
        if (!value) return '';
        return new Intl.NumberFormat('id-ID').format(value);
    }

    // Jalankan saat halaman dimuat (untuk mode Edit)
    if (priceHidden && priceHidden.value) {
        priceDisplay.value = formatRupiah(priceHidden.value);
    }

    // Jalankan setiap kali user mengetik harga
    priceDisplay.addEventListener('input', function () {
        // Hapus semua karakter kecuali angka
        let raw = this.value.replace(/\D/g, '');

        // Update input hidden yang akan dikirim ke Spring (angka bersih)
        priceHidden.value = raw;

        // Update tampilan di layar dengan titik ribuan
        this.value = raw ? formatRupiah(raw) : '';
    });
</script>

</body>
</html>
