<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-gray-50">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-2xl mx-auto py-8 px-4">
    <div class="bg-white p-8 rounded-lg shadow-md border border-gray-100">

        <h2 class="text-2xl font-bold text-gray-800 mb-6"
            th:text="${product.id != null} ? 'Edit Produk' : 'Tambah Produk Baru'">
        </h2>

        <form th:action="@{/products/save}" th:object="${product}" method="post" class="space-y-5">

            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{createdAt}">
            <input type="hidden" id="priceReal" th:field="*{price}">

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Produk</label>
                <input type="text" th:field="*{name}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                       required>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Kategori</label>
                <select name="categoryId"
                        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                        required>
                    <option value="">-- Pilih Kategori --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${product.categories != null && product.categories.id == cat.id}">
                    </option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Harga</label>
                <div class="flex">
                    <span class="inline-flex items-center px-3 bg-gray-100 border border-r-0 border-gray-300 rounded-l-md text-gray-600 text-sm">Rp</span>
                    <input type="text" id="priceDisplay"
                           class="w-full px-4 py-2 border border-gray-300 rounded-r-md focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                           placeholder="Contoh: 10.000" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Stok</label>
                <input type="number" th:field="*{stock}" min="0"
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                       required>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Deskripsi</label>
                <textarea th:field="*{description}" rows="3"
                          class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none transition"></textarea>
            </div>

            <div class="flex items-center">
                <input type="checkbox" th:field="*{active}" id="activeStatus"
                       class="h-5 w-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                <label for="activeStatus" class="ml-2 block text-sm font-semibold text-gray-700">Produk Aktif</label>
            </div>

            <div class="flex gap-3 pt-4">
                <button type="submit"
                        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-md transition duration-200">
                    Simpan
                </button>
                <a th:href="@{/products}"
                   class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded-md transition duration-200">
                    Batal
                </a>
            </div>

        </form>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
    const priceHidden = document.getElementById('priceReal');
    const priceDisplay = document.getElementById('priceDisplay');

    function formatRupiah(value) {
        if (!value) return '';
        return new Intl.NumberFormat('id-ID').format(value);
    }

    if (priceHidden && priceHidden.value) {
        priceDisplay.value = formatRupiah(priceHidden.value);
    }

    priceDisplay.addEventListener('input', function () {
        let raw = this.value.replace(/\D/g, '');
        priceHidden.value = raw;
        this.value = raw ? formatRupiah(raw) : '';
    });
</script>

</body>
</html>
