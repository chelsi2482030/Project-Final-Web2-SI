<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 th:text="${product.id != null} ? 'Edit Produk' : 'Tambah Produk Baru'" class="mb-4">Form Produk</h2>

            <form th:action="@{/products/save}" th:object="${product}" method="post">

                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{createdAt}">

                <!-- Nama Produk -->
                <div class="mb-3">
                    <label class="form-label">Nama Produk</label>
                    <input type="text" class="form-control" th:field="*{name}"
                           placeholder="Masukkan nama produk" required>
                </div>

                <!-- Kategori -->
                <div class="mb-3">
                    <label class="form-label">Kategori</label>
                    <select class="form-select" th:field="*{category}" required>
                        <option value="">-- Pilih Kategori --</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat}"
                                th:text="${cat.displayName}">
                        </option>
                    </select>
                </div>

                <!-- Harga -->
                <div class="mb-3">
                    <label class="form-label">Harga</label>
                    <input type="hidden" th:field="*{price}">
                    <input type="text" class="form-control" id="priceDisplay"
                           placeholder="Masukkan harga produk" required>
                </div>

                <!-- Stok -->
                <div class="mb-3">
                    <label class="form-label">Stok</label>
                    <input type="number" class="form-control" th:field="*{stock}" min="0" required>
                </div>

                <!-- Deskripsi -->
                <div class="mb-3">
                    <label class="form-label">Deskripsi</label>
                    <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                </div>

                <!-- Aktif -->
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" th:field="*{active}">
                    <label class="form-check-label">Produk Aktif</label>
                </div>

                <!-- Button -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Simpan Produk</button>
                    <a th:href="@{/products}" class="btn btn-secondary">Batal</a>
                </div>

            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<!-- PRICE SCRIPT (SUDAH DIPERBAIKI AMAN) -->
<script>
    const priceHidden = document.querySelector('input[name="price"]');
    const priceDisplay = document.getElementById('priceDisplay');

    function formatThousand(value) {
        return Number(value || 0).toLocaleString('id-ID');
    }

    // init value
    if (priceHidden && priceHidden.value) {
        priceDisplay.value = formatThousand(priceHidden.value);
    }

    // input sync
    priceDisplay.addEventListener('input', function () {
        const raw = this.value.replace(/\./g, '').replace(/\D/g, '');

        if (priceHidden) {
            priceHidden.value = raw || 0;
        }

        this.value = raw ? formatThousand(raw) : '';
    });
</script>

</body>
</html>
