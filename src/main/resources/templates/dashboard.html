<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}">
</head>

<body class="bg-gray-50">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-7xl mx-auto px-4 py-8">
    <h2 class="text-2xl font-bold mb-6 text-red-500">Dashboard Overview</h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
            <div class="text-gray-500 text-xs font-semibold uppercase tracking-wider">Total Produk</div>
            <h2 class="text-3xl font-bold mt-2" th:text="${totalProduk}">0</h2>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
            <div class="text-gray-500 text-xs font-semibold uppercase tracking-wider">Inventory Value</div>
            <h2 class="text-3xl font-bold mt-2">
                Rp <span th:text="${#numbers.formatDecimal(inventoryValue, 0, 'POINT', 0, 'COMMA')}">0</span>
            </h2>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
            <div class="text-gray-500 text-xs font-semibold uppercase tracking-wider">Status</div>
            <div class="mt-2 text-lg">
                <span class="text-green-600 font-bold" th:text="${aktif}">0</span> Aktif |
                <span class="text-red-600 font-bold" th:text="${nonAktif}">0</span> Nonaktif
            </div>
        </div>
    </div>

    <hr class="my-8 border-gray-200">

    <h5 class="mb-4 text-red-600 font-semibold flex items-center gap-2">
        ⚠️ Stok Menipis
    </h5>

    <div class="bg-white shadow-sm border border-gray-200 rounded-lg overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nama Produk</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Stok</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Kategori</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
            <tr th:each="p : ${lowStockProducts}" class="hover:bg-gray-50">
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${p.name}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-red-600 font-bold" th:text="${p.stock}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${p.categories != null ? p.categories.name : '-'}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(lowStockProducts)}">
                <td colspan="3" class="px-6 py-4 text-center text-sm text-gray-500">Tidak ada produk dengan stok menipis</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- BARIS YANG DITAMBAHKAN ADA DI BAWAH INI -->
<footer th:replace="~{fragments/layout :: footer}"></footer>

</body>
</html>
