<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>My Profile - Product CRUD</title>
    <!-- Fragmen Header -->
    <th:block th:replace="~{fragments/layout :: header}"></th:block>
</head>

<body>

<!-- Fragmen Navbar -->
<th:block th:replace="~{fragments/layout :: navbar}"></th:block>

<div class="container mt-5">
    <div class="card shadow border-0">
        <div class="card-body p-5">
            <h2 class="mb-4 text-primary">User Profile</h2>
            <hr>

            <!-- CEK JIKA USER ADA -->
            <div th:if="${user != null}" class="row mt-4">

                <!-- BAGIAN FOTO (KIRI) -->
                <div class="col-md-4 text-center border-end">
                    <img th:src="${user.profileImageUrl != null && !user.profileImageUrl.isEmpty() ? user.profileImageUrl : 'https://ui-avatars.com/api/?name=' + user.fullName + '&background=random&size=150'}"
                         class="rounded-circle shadow-sm border"
                         style="width: 180px; height: 180px; object-fit: cover;"
                         alt="Profile Picture">
                    <h4 class="mt-3" th:text="${user.fullName}">Nama Lengkap</h4>
                    <p class="text-muted" th:text="'@' + ${user.username}">@username</p>
                </div>

                <!-- BAGIAN DATA (KANAN) -->
                <div class="col-md-8 ps-md-5">
                    <div class="row mb-3">
                        <div class="col-sm-4 fw-bold text-secondary">Email</div>
                        <div class="col-sm-8" th:text="${user.email != null ? user.email : '-'}">email@example.com</div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-sm-4 fw-bold text-secondary">Phone Number</div>
                        <div class="col-sm-8" th:text="${user.phoneNumber != null ? user.phoneNumber : '-'}">0812xxx</div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-sm-4 fw-bold text-secondary">Address</div>
                        <div class="col-sm-8" th:text="${user.address != null ? user.address : '-'}">Alamat Lengkap</div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-sm-4 fw-bold text-secondary">Bio</div>
                        <div class="col-sm-8 text-muted fst-italic" th:text="${user.bio != null ? user.bio : 'No bio available.'}">Bio singkat</div>
                    </div>

                    <div class="mt-4">
                        <a th:href="@{/edit-profile}" class="btn btn-primary px-4">
                            <i class="bi bi-pencil-square"></i> Edit Profile
                        </a>
                    </div>
                </div>

            </div>

            <!-- JIKA USER TIDAK DITEMUKAN -->
            <div th:if="${user == null}" class="text-center py-5">
                <div class="alert alert-warning">
                    User tidak ditemukan atau sesi telah berakhir. Silakan login kembali.
                </div>
                <a th:href="@{/login}" class="btn btn-secondary">Go to Login</a>
            </div>

        </div>
    </div>
</div>

<!-- Fragmen Footer -->
<th:block th:replace="~{fragments/layout :: footer}"></th:block>

</body>
</html>
