<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>My Profile - Product CRUD</title>
    <th:block th:replace="~{fragments/layout :: header}"></th:block>
</head>

<body class="bg-gray-50">

<th:block th:replace="~{fragments/layout :: navbar}"></th:block>

<div class="max-w-4xl mx-auto py-8 px-4">
    <div class="bg-white p-8 rounded-xl shadow-md border border-gray-100">

        <h2 class="text-2xl font-bold mb-6 text-blue-600">User Profile</h2>
        <hr class="border-gray-200 mb-8">

        <div th:if="${user != null}" class="grid grid-cols-1 md:grid-cols-3 gap-8">

            <div class="flex flex-col items-center md:border-r border-gray-100 pr-0 md:pr-8">
                <img th:src="${user.profileImageUrl != null && !user.profileImageUrl.isEmpty() ? user.profileImageUrl : 'https://ui-avatars.com/api/?name=' + user.fullName + '&background=random&size=150'}"
                     class="w-44 h-44 rounded-full shadow-sm border border-gray-200 object-cover"
                     alt="Profile Picture">
                <h4 class="mt-4 font-bold text-lg text-gray-900" th:text="${user.fullName}">Nama Lengkap</h4>
                <p class="text-gray-500" th:text="'@' + ${user.username}">@username</p>
            </div>

            <div class="md:col-span-2 space-y-6">

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                    <div class="font-bold text-gray-500">Email</div>
                    <div class="sm:col-span-2 text-gray-900" th:text="${user.email != null ? user.email : '-'}">email@example.com</div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                    <div class="font-bold text-gray-500">Phone Number</div>
                    <div class="sm:col-span-2 text-gray-900" th:text="${user.phoneNumber != null ? user.phoneNumber : '-'}">0812xxx</div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                    <div class="font-bold text-gray-500">Address</div>
                    <div class="sm:col-span-2 text-gray-900" th:text="${user.address != null ? user.address : '-'}">Alamat Lengkap</div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-2">
                    <div class="font-bold text-gray-500">Bio</div>
                    <div class="sm:col-span-2 text-gray-600 italic" th:text="${user.bio != null ? user.bio : 'No bio available.'}">Bio singkat</div>
                </div>

                <div class="pt-4">
                    <a th:href="@{/edit-profile}" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-md transition duration-200">
                        Edit Profile
                    </a>
                </div>
            </div>

        </div>

        <div th:if="${user == null}" class="text-center py-10">
            <div class="bg-yellow-50 text-yellow-800 p-4 rounded-md border border-yellow-200 mb-4">
                User tidak ditemukan atau sesi telah berakhir. Silakan login kembali.
            </div>
            <a th:href="@{/login}" class="bg-gray-500 hover:bg-gray-600 text-white py-2 px-6 rounded-md transition">Go to Login</a>
        </div>

    </div>
</div>

<th:block th:replace="~{fragments/layout :: footer}"></th:block>

</body>
</html>
