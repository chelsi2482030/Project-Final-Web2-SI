<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-6 rounded shadow w-full max-w-md">

    <h2 class="text-xl font-bold mb-4 text-center">Login</h2>

    <div th:if="${param.error}" class="bg-red-100 text-red-700 p-2 mb-3 rounded text-sm">
        Username atau password salah!
    </div>

    <div th:if="${param.logout}" class="bg-blue-100 text-blue-700 p-2 mb-3 rounded text-sm">
        Berhasil logout.
    </div>

    <form th:action="@{/login}" method="post">

        <input type="text" name="username"
               placeholder="Username"
               class="w-full mb-3 px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500"
               required>

        <input type="password" name="password"
               placeholder="Password"
               class="w-full mb-4 px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500"
               required>

        <button type="submit"
                class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
            Login
        </button>
    </form>

    <div class="text-center mt-3 text-sm flex flex-col space-y-2">
        <div>
            Belum punya akun?
            <a th:href="@{/register}" class="text-blue-600 hover:underline">Daftar</a>
        </div>

        <div class="border-t border-gray-200 my-1"></div>

        <div>
            <a th:href="@{/forgot-password}" class="text-gray-500 hover:text-blue-600 hover:underline text-xs">
                Lupa kata sandi?
            </a>
        </div>
    </div>
</div>

</body>
</html>
