<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <th:block th:replace="~{fragments/layout :: header}"></th:block>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">

    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Login</h2>

    <div th:if="${param.error}" class="bg-red-50 text-red-700 p-3 mb-4 rounded border border-red-200 text-sm">
        Username atau password salah!
    </div>

    <div th:if="${param.logout}" class="bg-blue-50 text-blue-700 p-3 mb-4 rounded border border-blue-200 text-sm">
        Berhasil logout.
    </div>

    <form th:action="@{/login}" method="post" class="space-y-4">
        <div>
            <input type="text" name="username" placeholder="Username"
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none"
                   required>
        </div>

        <div>
            <input type="password" name="password" placeholder="Password"
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none"
                   required>
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-md transition duration-200">
            Login
        </button>
    </form>

    <div class="text-center mt-6 text-sm space-y-2">
        <p>Belum punya akun? <a th:href="@{/register}" class="text-blue-600 hover:underline font-semibold">Daftar</a></p>
        <div class="border-t border-gray-100 my-2"></div>
        <p><a th:href="@{/forgot-password}" class="text-gray-500 hover:text-blue-600 hover:underline text-xs">Lupa kata sandi?</a></p>
    </div>
</div>

</body>
</html>
